e a conversation with your family to discuss a plan for improvement.","We are committed to supporting her, but meaningful improvement will require effort at home and at school."],n:["This is an area that needs immediate and sustained attention heading into next quarter.","A score of 1 has triggered a conversation between the teacher, Dean of Students, and Headmaster."]}};

sent during instruction, listening carefully, and tracking with the lesson at all times.","He models attentive learning, giving his full focus to the teacher and to his classmates during discussion."],she:["She is remarkably attentive \u2014 fully present during instruction, listening carefully, and tracking with the lesson at all times.","She models attentive learning, giving her full focus to the teacher and to her classmates during discussion."]},4:{he:["He is consistently attentive during instruction and stays engaged throughout the class period.","He listens well and demonstrates focus during lectures and discussions with only minor lapses."],she:["She is consistently attentive during instruction and stays engaged throughout the class period.","She listens well and demonstrates focus during lectures and discussions with only minor lapses."]},3:{he:["His attentiveness is inconsistent; he is sometimes focused but is often distracted or having side conversations.","He listens when engaged but struggles to maintain attention throughout a full class period."],she:["Her attentiveness is inconsistent; she is sometimes focused but is often distracted or having side conversations.","She listens when engaged but struggles to maintain attention throughout a full class period."]},2:{he:["He is frequently inattentive during instruction, missing key content and needing regular redirection.","Attention is a significant concern; he is often mentally absent even when physically present."],she:["She is frequently inattentive during instruction, missing key content and needing regular redirection.","Attention is a significant concern; she is often mentally absent even when physically present."]},1:{he:["He shows no effort to pay attention during instruction and is consistently disengaged from the lesson.","He is entirely inattentive and does not respond to attempts to redirect his focus."],she:["She shows no effort to pay attention during instruction and is consistently disengaged from the lesson.","She is entirely inattentive and does not respond to attempts to redirect her focus."]}},charity:{5:{he:["He is a net positive for the classroom \u2014 genuinely charitable, building others up in discussion and making the room better by his presence.","He uses his voice to strengthen the learning environment, treating every classmate with kindness and making space for others to participate."],she:["She is a net positive for the classroom \u2014 genuinely charitable, building others up in discussion and making the room better by her presence.","She uses her voice to strengthen the learning environment, treating every classmate with kindness and making space for others to participate."]},4:{he:["He treats classmates with respect, listens well during discussion, and does not pull others off task.","He is consistently kind and contributes to a positive, focused classroom environment."],she:["She treats classmates with respect, listens well during discussion, and does not pull others off task.","She is consistently kind and contributes to a positive, focused classroom environment."]},3:{he:["He is generally respectful but his impact on the room is inconsistent; he occasionally contributes to off-task behavior or side conversations.","He is capable of strong engagement but does not always use his influence in the classroom positively."],she:["She is generally respectful but her impact on the room is inconsistent; she occasionally contributes to off-task behavior or side conversations.","She is capable of strong engagement but does not always use her influence in the classroom positively."]},2:{he:["His side conversations and off-task remarks frequently pull other students away from the lesson and disrupt the learning environment.","He is capable of meaningful contributions but too often uses his energy to derail discussion or distract classmates."],she:["Her side conversations and off-task remarks frequently pull other students away from the lesson and erial and would benefit from the courage to dig deeper."]},2:{he:["He rarely asks questions or engages with the material beyond what is strictly required.","He shows little curiosity or initiative and tends to do the minimum."],she:["She rarely asks questions or engages with the material beyond what is strictly required.","She shows little curiosity or initiative and tends to do the minimum."]},1:{he:["He shows no interest in engaging with the material at any level of depth.","He refuses to participate and has not responded to invitations to engage."],she:["She shows no interest in engaging with the material at any level of depth.","She refuses to participate and has not responded to invitations to engage."]}}};
